<!DOCTYPE html>
<html lang='vi'>
<head>
    <meta charset='UTF-8'>
    <title>🤖 Local AI Engineer</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .card { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .field { margin-bottom: 12px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 13px; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .row { display: flex; gap: 10px; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        #terminal { background: #1e1e1e; color: #00ff00; padding: 15px; font-family: monospace; height: 350px; overflow-y: auto; border-radius: 5px; margin-top: 20px; white-space: pre-wrap; font-size: 12px; }
    </style>
</head>
<body>
    <div class='card'>
        <h2>🤖 Local AI Agent (Full Context)</h2>
        <div class='field'><label>Path dự án</label><input type='text' id='projectPath' value='~/projects/tti_dcs/wonder-screen-frontend/frontend'></div>
        <div class='row'>
            <div class='field'><label>Type</label><select id='gitType'><option value='feature'>feat</option><option value='fix' selected>fix</option></select></div>
            <div class='field'><label>Username</label><input type='text' id='username' value='cuongnv'></div>
            <div class='field'><label>Issue</label><input type='text' id='issueCode' value='WSC-123'></div>
        </div>
        <div class='row'>
            <div class='field'><label>Ngôn ngữ</label><select id='projectType'><option value='go'>Go</option><option value='php'>PHP</option><option value='javascript'>JS</option></select></div>
            <div class='field'><label>Tác vụ</label><select id='taskType'><option value='fix_code'>Sửa Code & Git</option><option value='summarize'>Chỉ đọc</option></select></div>
        </div>
        <div class='field'><label>File tham khảo (mỗi file 1 dòng)</label><textarea id='referenceFiles' rows='2'></textarea></div>
        <div class='field'><label>Yêu cầu chi tiết (Tiếng Việt)</label><textarea id='instruction' rows='3'></textarea></div>
        <button id='runBtn' onclick='run()'>BẮT ĐẦU CHẠY 🚀</button>
        <div id='terminal'>--- Sẵn sàng ---</div>
    </div>
    <script>
        async function run() {
            const btn = document.getElementById('runBtn');
            const term = document.getElementById('terminal');
            btn.disabled = true; term.innerText = 'AI đang thực thi...';
            try {
                const res = await fetch('/api/run-agent', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        projectPath: document.getElementById('projectPath').value,
                        projectType: document.getElementById('projectType').value,
                        taskType: document.getElementById('taskType').value,
                        instruction: document.getElementById('instruction').value,
                        referenceFiles: document.getElementById('referenceFiles').value,
                        gitType: document.getElementById('gitType').value,
                        username: document.getElementById('username').value,
                        issueCode: document.getElementById('issueCode').value
                    })
                });
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                while (true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    term.innerText += decoder.decode(value);
                    term.scrollTop = term.scrollHeight;
                }
            } catch (e) { term.innerText += 'Lỗi kết nối.'; }
            btn.disabled = false;
        }
    </script>
</body>
</html>
